<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* This ensures the map box isn't zero pixels tall */
        #map-container { height: 100%; width: 100%; min-height: 400px; background: #020617; }
        .leaflet-container { background: #020617 !important; border-radius: 24px; }
        
        /* Pulse Animation */
        .dot-pulse {
            width: 12px; height: 12px; background: #6366f1; border-radius: 50%;
            box-shadow: 0 0 0 rgba(99, 102, 241, 0.4); animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue { 
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } 
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [devices, setDevices] = useState([
                { id: 'DEFAULT', name: 'Taipei Hub', lat: 25.0330, lng: 121.5654 }
            ]);
            const mapInstance = useRef(null);

            useEffect(() => {
                // Timer prevents the "Black Box" by waiting for React to render the div
                const timer = setTimeout(() => {
                    if (!mapInstance.current) {
                        // Initialize Map
                        mapInstance.current = L.map('map-container', { zoomControl: false })
                            .setView([25.033, 121.565], 11);

                        // Load Dark Mode Tiles
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                            attribution: '&copy; CARTO'
                        }).addTo(mapInstance.current);

                        // Add Default Marker
                        const icon = L.divIcon({ className: 'dot-pulse', iconSize: [12, 12] });
                        L.marker([25.033, 121.565], { icon }).addTo(mapInstance.current);
                    }
                }, 100);

                return () => clearTimeout(timer);
            }, []);

            return (
                <div className="flex h-screen w-screen p-6 gap-6">
                    {/* Sidebar Area */}
                    <div className="w-80 flex flex-col gap-4">
                        <div className="bg-slate-800/50 p-6 rounded-[2rem] border border-white/10 backdrop-blur-md">
                            <h1 className="text-2xl font-black italic tracking-tighter">AETHER<span className="text-indigo-500">.</span></h1>
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Satellite Operations</p>
                        </div>
                        
                        <div className="flex-1 bg-slate-800/50 p-6 rounded-[2rem] border border-white/10 backdrop-blur-md overflow-y-auto">
                            <h2 className="text-xs font-bold text-slate-400 uppercase mb-4">Live Nodes</h2>
                            {devices.map(d => (
                                <div key={d.id} className="flex items-center gap-3 p-3 bg-white/5 rounded-xl mb-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    <span className="text-sm font-bold truncate">{d.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Map Area */}
                    <div className="flex-1 relative">
                        <div id="map-container" className="shadow-2xl shadow-indigo-500/10 border border-white/5"></div>
                        
                        {/* Overlay Controls */}
                        <div className="absolute top-6 left-6 z-[1000] pointer-events-none">
                            <div className="bg-slate-900/80 backdrop-blur-xl border border-white/10 p-4 rounded-2xl shadow-2xl">
                                <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest leading-none mb-1">Status</p>
                                <p className="text-sm font-bold">System Online</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
