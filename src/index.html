<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether v2 | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-ring { 0% { transform: scale(.33); } 80%, 100% { opacity: 0; } }
        .pulse-dot { position: relative; width: 12px; height: 12px; border-radius: 50%; background: #10b981; }
        .pulse-dot::before { content: ''; position: absolute; display: block; width: 300%; height: 300%; box-sizing: border-box; margin-left: -100%; margin-top: -100%; border-radius: 45px; background-color: #10b981; animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        .map-grid { background-color: #020617; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [view, setView] = useState('map');
            const [selectedDevice, setSelectedDevice] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");
            const [devices, setDevices] = useState(() => {
                const saved = localStorage.getItem("user_devices");
                return saved ? JSON.parse(saved) : [
                    { id: 'B827EB63D1C8', name: 'Example Location', lat: 35, lng: 40 }
                ];
            });

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, devices, selectedDevice]);

            // Filtered device list based on search
            const filteredDevices = useMemo(() => {
                return devices.filter(d => d.name.toLowerCase().includes(searchQuery.toLowerCase()) || d.id.includes(searchQuery));
            }, [devices, searchQuery]);

            const handleAdd = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newDev = { id: fd.get('id').trim(), name: fd.get('name'), lat: fd.get('lat'), lng: fd.get('lng') };
                const updated = [...devices, newDev];
                setDevices(updated);
                localStorage.setItem("user_devices", JSON.stringify(updated));
                e.target.reset();
            };

            return (
                <div className="flex h-screen w-full overflow-hidden bg-white">
                    {/* SIDEBAR */}
                    <aside className="w-80 border-r border-slate-100 flex flex-col p-6 z-20 bg-white">
                        <div className="flex items-center gap-3 mb-8">
                            <div className="h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                <i data-lucide="zap"></i>
                            </div>
                            <span className="font-bold text-xl tracking-tight">AETHER <span className="text-indigo-600">OS</span></span>
                        </div>

                        {/* Search Bar (New Feature) */}
                        <div className="relative mb-6">
                            <i data-lucide="search" className="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                            <input 
                                type="text" 
                                placeholder="Filter nodes..." 
                                className="w-full bg-slate-50 border-none rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 ring-indigo-500 transition-all"
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>

                        <nav className="flex-1 overflow-y-auto space-y-1">
                            <button onClick={() => setView('map')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm transition-all ${view==='map'?'bg-indigo-50 text-indigo-700':'text-slate-500 hover:bg-slate-50'}`}>
                                <i data-lucide="globe" className="w-4 h-4"></i> Network Map
                            </button>
                            
                            <div className="pt-4 pb-2 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Active Nodes</div>
                            {filteredDevices.map(d => (
                                <button key={d.id} onClick={() => { setSelectedDevice(d); setView('map'); }} className="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 group">
                                    <div className="flex items-center gap-3 truncate">
                                        <div className="w-2 h-2 rounded-full bg-emerald-500"></div>
                                        <span className="truncate">{d.name}</span>
                                    </div>
                                    <i data-lucide="chevron-right" className="w-3 h-3 opacity-0 group-hover:opacity-100 transition-all"></i>
                                </button>
                            ))}
                        </nav>

                        <button onClick={() => setView('add')} className="mt-4 w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm shadow-xl hover:bg-indigo-600 transition-all">
                            + New Deployment
                        </button>
                    </aside>

                    {/* MAIN AREA */}
                    <main className="flex-1 relative flex flex-col bg-slate-50">
                        {view === 'map' ? (
                            <div className="h-full w-full relative map-grid p-6">
                                {/* Header Overlay */}
                                <div className="absolute top-10 left-10 z-10 pointer-events-none">
                                    <h1 className="text-white text-4xl font-black tracking-tighter">GLOBAL OPS</h1>
                                    <div className="flex items-center gap-2 text-indigo-400 font-mono text-xs mt-2 uppercase tracking-widest">
                                        <span className="pulse-dot"></span> System Live • {devices.length} Nodes Online
                                    </div>
                                </div>

                                {/* Map Points */}
                                {filteredDevices.map(d => (
                                    <div key={d.id} className="absolute group" style={{ left: `${d.lng}%`, top: `${d.lat}%` }}>
                                        <div 
                                            onClick={() => setSelectedDevice(d)}
                                            className="relative flex flex-col items-center cursor-pointer transform -translate-x-1/2 -translate-y-1/2"
                                        >
                                            <div className="bg-white/10 backdrop-blur-md border border-white/20 p-1 rounded-full group-hover:scale-125 transition-all">
                                                <div className="h-3 w-3 bg-indigo-500 rounded-full shadow-[0_0_15px_rgba(99,102,241,0.8)]"></div>
                                            </div>
                                            <div className="mt-2 bg-slate-900/80 backdrop-blur-xl text-white px-3 py-1 rounded-lg text-[10px] font-bold border border-white/10 opacity-0 group-hover:opacity-100 transition-all uppercase tracking-tighter">
                                                {d.name}
                                            </div>
                                        </div>
                                    </div>
                                ))}

                                {/* Device Detail Panel (New Feature) */}
                                {selectedDevice && (
                                    <div className="absolute bottom-10 right-10 w-80 bg-white/95 backdrop-blur-xl p-6 rounded-3xl shadow-2xl border border-white/20 animate-in slide-in-from-right-10 fade-in duration-500">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h3 className="font-black text-xl text-slate-900 uppercase">{selectedDevice.name}</h3>
                                                <p className="text-[10px] text-slate-400 font-mono">{selectedDevice.id}</p>
                                            </div>
                                            <button onClick={() => setSelectedDevice(null)} className="p-1 hover:bg-slate-100 rounded-full transition-colors">
                                                <i data-lucide="x" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3 mb-6">
                                            <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <p className="text-[10px] font-bold text-slate-400 mb-1">PM 2.5</p>
                                                <p className="text-xl font-black text-indigo-600">24 <span className="text-[10px] font-medium text-slate-400">μg</span></p>
                                            </div>
                                            <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <p className="text-[10px] font-bold text-slate-400 mb-1">STATION</p>
                                                <p className="text-xl font-black text-slate-900">ACTV</p>
                                            </div>
                                        </div>
                                        <button className="w-full bg-indigo-600 text-white py-3 rounded-xl text-xs font-bold hover:shadow-lg transition-all">
                                            Open Full Analytics
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="h-full flex items-center justify-center">
                                <form onSubmit={(e) => { handleAdd(e); setView('map'); }} className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 w-full max-w-md">
                                    <h2 className="text-3xl font-black mb-8 tracking-tighter uppercase text-slate-900">Provision Node</h2>
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Hardware Identifier</label>
                                            <input name="id" placeholder="e.g. B827EB..." className="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm" required />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Alias</label>
                                            <input name="name" placeholder="Station Nickname" className="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm" required />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="lat" placeholder="Y-Pos (0-100)" className="bg-slate-50 border-none p-4 rounded-2xl text-sm" required />
                                            <input name="lng" placeholder="X-Pos (0-100)" className="bg-slate-50 border-none p-4 rounded-2xl text-sm" required />
                                        </div>
                                        <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest mt-4 shadow-xl shadow-indigo-100 hover:scale-[1.02] transition-all">
                                            Deploy Node
                                        </button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
