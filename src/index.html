<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Modular Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        #map-container { height: 100%; width: 100%; min-height: 500px; background: #020617; border-radius: 2rem; }
        .leaflet-container { background: #020617 !important; }
        .dot-pulse {
            width: 12px; height: 12px; background: #6366f1; border-radius: 50%;
            box-shadow: 0 0 0 rgba(99, 102, 241, 0.4); animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue { 
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } 
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel" src="map-logic.js"></script>
</body>
</html>
