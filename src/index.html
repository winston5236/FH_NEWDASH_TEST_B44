<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Geospatial Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #map { height: 100%; width: 100%; border-radius: 2rem; z-index: 1; }
        .leaflet-container { background: #020617 !important; }
        /* Professional Pulse Marker */
        .custom-pulse {
            width: 12px; height: 12px; background: #6366f1; border-radius: 50%;
            box-shadow: 0 0 0 rgba(99, 102, 241, 0.4); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('map');
            const [devices, setDevices] = useState(() => {
                const saved = localStorage.getItem("user_devices");
                return saved ? JSON.parse(saved) : [
                    { id: 'B827EB63D1C8', name: 'Base Station', lat: 25.0330, lng: 121.5654 }
                ];
            });
            const mapRef = useRef(null);
            const leafletMap = useRef(null);

            // Initialize Leaflet Map
            useEffect(() => {
                if (view === 'map' && !leafletMap.current) {
                    // Create map centered on first device
                    leafletMap.current = L.map('map', { zoomControl: false }).setView([devices[0].lat, devices[0].lng], 12);
                    
                    // Add Dark Mode Tiles (CartoDB Dark Matter)
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap &copy; CARTO'
                    }).addTo(leafletMap.current);
                }

                // Update markers whenever devices change
                if (leafletMap.current) {
                    // Clear old markers if necessary or just add new ones
                    devices.forEach(dev => {
                        const icon = L.divIcon({ className: 'custom-pulse', iconSize: [12, 12] });
                        L.marker([dev.lat, dev.lng], { icon })
                         .addTo(leafletMap.current)
                         .bindPopup(`<b class="font-bold">${dev.name}</b><br><span class="text-xs text-slate-500">${dev.id}</span>`);
                    });
                }
            }, [view, devices]);

            const handleAdd = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newDev = { 
                    id: fd.get('id'), 
                    name: fd.get('name'), 
                    lat: parseFloat(fd.get('lat')), 
                    lng: parseFloat(fd.get('lng')) 
                };
                const updated = [...devices, newDev];
                setDevices(updated);
                localStorage.setItem("user_devices", JSON.stringify(updated));
                e.target.reset();
                setView('map');
            };

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <aside className="w-80 border-r border-slate-200 bg-white p-6 flex flex-col z-20 shadow-xl">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                                <i data-lucide="satellite"></i>
                            </div>
                            <span className="font-black text-xl tracking-tighter italic">AETHER MAPS</span>
                        </div>

                        <nav className="flex-1 space-y-2">
                            <button onClick={() => setView('map')} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm ${view==='map'?'bg-slate-100 text-indigo-600':'text-slate-400'}`}>
                                <i data-lucide="map"></i> Live View
                            </button>
                            <button onClick={() => setView('add')} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold text-sm ${view==='add'?'bg-slate-100 text-indigo-600':'text-slate-400'}`}>
                                <i data-lucide="plus-circle"></i> Provision Node
                            </button>
                        </nav>
                        
                        <div className="mt-auto bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Status</p>
                            <div className="flex items-center gap-2 text-xs font-bold text-emerald-600">
                                <span className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                Geospatial Sync Active
                            </div>
                        </div>
                    </aside>

                    {/* MAP CONTENT */}
                    <main className="flex-1 p-8 bg-slate-50 flex flex-col">
                        {view === 'map' ? (
                            <div className="flex-1 relative bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl border-8 border-white">
                                <div id="map"></div>
                                <div className="absolute top-6 left-6 z-[1000] pointer-events-none">
                                    <div className="bg-white/90 backdrop-blur-md p-4 rounded-2xl shadow-lg border border-white/20">
                                        <h2 className="text-slate-900 font-black tracking-tighter text-xl uppercase italic">Network Layer</h2>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none">Global Environmental Index</p>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="h-full flex items-center justify-center">
                                <form onSubmit={handleAdd} className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 w-full max-w-md">
                                    <h2 className="text-2xl font-black mb-6 uppercase tracking-tighter">Register New Lat/Lng</h2>
                                    <div className="space-y-4">
                                        <input name="id" placeholder="LASS Device ID" className="w-full bg-slate-50 p-4 rounded-2xl text-sm border-none outline-none focus:ring-2 ring-indigo-500" required />
                                        <input name="name" placeholder="Location Name" className="w-full bg-slate-50 p-4 rounded-2xl text-sm border-none outline-none focus:ring-2 ring-indigo-500" required />
                                        <div className="grid grid-cols-2 gap-4">
                                            <input name="lat" type="number" step="any" placeholder="Latitude (e.g. 25.0)" className="bg-slate-50 p-4 rounded-2xl text-sm" required />
                                            <input name="lng" type="number" step="any" placeholder="Longitude (e.g. 121.5)" className="bg-slate-50 p-4 rounded-2xl text-sm" required />
                                        </div>
                                        <button className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest mt-4 shadow-xl shadow-slate-200">Deploy to Map</button>
                                    </div>
                                </form>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
