<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | LASS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
        .animate-ping-custom { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        .map-bg {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('map');
            const [selectedId, setSelectedId] = useState(null);
            const [deviceData, setDeviceData] = useState(null);
            
            // 1. Set the first point as the default location
            const [devices, setDevices] = useState(() => {
                const saved = localStorage.getItem("user_devices");
                const defaultPoint = { id: 'B827EB63D1C8', name: 'Example Location', lat: 25, lng: 25 };
                
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // Ensure our example is always there if the list is empty
                    return parsed.length > 0 ? parsed : [defaultPoint];
                }
                return [defaultPoint];
            });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, devices]);

            const fetchLASS = async (id) => {
                try {
                    const res = await fetch('https://pm25.lass-net.org/data/last-all-lass.json');
                    const json = await res.json();
                    const data = json.feeds.find(f => f.device_id === id);
                    setDeviceData(data);
                } catch (e) { console.error("Sync Error", e); }
            };

            const addDevice = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newDev = {
                    id: formData.get('deviceId').trim(),
                    name: formData.get('name'),
                    lat: formData.get('lat'),
                    lng: formData.get('lng')
                };
                const updated = [...devices, newDev];
                setDevices(updated);
                localStorage.setItem("user_devices", JSON.stringify(updated));
                e.target.reset();
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-white border-r border-slate-200 p-6 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="h-10 w-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="wind"></i>
                            </div>
                            <span className="font-black text-xl tracking-tighter italic text-slate-800">AETHER</span>
                        </div>

                        <form onSubmit={addDevice} className="space-y-3 mb-10">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Register New Point</p>
                            <input name="deviceId" placeholder="LASS ID (e.g. B827...)" className="w-full p-2 text-sm border border-slate-200 rounded-lg outline-none focus:ring-2 ring-slate-100" required />
                            <input name="name" placeholder="Nickname" className="w-full p-2 text-sm border border-slate-200 rounded-lg outline-none focus:ring-2 ring-slate-100" required />
                            <div className="flex gap-2">
                                <input name="lat" placeholder="Lat 0-100" className="w-1/2 p-2 text-sm border border-slate-200 rounded-lg" required />
                                <input name="lng" placeholder="Lng 0-100" className="w-1/2 p-2 text-sm border border-slate-200 rounded-lg" required />
                            </div>
                            <button className="w-full bg-slate-900 text-white p-2 rounded-lg text-sm font-bold hover:bg-slate-800">Deploy Analytics</button>
                        </form>

                        <nav className="flex-1 overflow-y-auto">
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-4">Navigations</p>
                            <button onClick={() => setView('map')} className={`w-full flex items-center gap-3 p-3 rounded-xl mb-2 font-bold text-sm ${view === 'map' ? 'bg-slate-100' : ''}`}>
                                <i data-lucide="map"></i> Live Map
                            </button>
                            {devices.map(dev => (
                                <button 
                                    key={dev.id}
                                    onClick={() => { setView('device'); setSelectedId(dev.id); fetchLASS(dev.id); }}
                                    className={`w-full flex items-center gap-3 p-3 rounded-xl mb-1 font-bold text-sm text-slate-500 hover:text-slate-900`}
                                >
                                    <i data-lucide="layout-dashboard"></i> <span className="truncate">{dev.name}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 p-10 flex flex-col overflow-hidden">
                        {view === 'map' ? (
                            <>
                                <h1 className="text-3xl font-black mb-1">Command Center</h1>
                                <p className="text-slate-500 mb-8">Environmental Visualization Network</p>
                                <div className="flex-1 map-bg rounded-[2.5rem] relative overflow-hidden shadow-2xl border-8 border-white">
                                    {devices.map((dev, idx) => (
                                        <div 
                                            key={idx} 
                                            className="absolute cursor-pointer group"
                                            style={{ left: `${dev.lng}%`, top: `${dev.lat}%` }}
                                            onClick={() => { setView('device'); setSelectedId(dev.id); fetchLASS(dev.id); }}
                                        >
                                            <div className="absolute h-12 w-12 bg-emerald-500/30 rounded-full -translate-x-1/2 -translate-y-1/2 animate-ping-custom"></div>
                                            <div className="bg-emerald-500 text-white px-4 py-1.5 rounded-full text-[10px] font-black shadow-xl border-2 border-white -translate-x-1/2 -translate-y-1/2 group-hover:scale-110 transition-transform whitespace-nowrap">
                                                {dev.name}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="space-y-8">
                                <h2 className="text-4xl font-black uppercase tracking-tighter">{selectedId}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                        <p className="text-xs font-bold text-slate-400 uppercase mb-2">PM2.5</p>
                                        <p className="text-3xl font-black">{deviceData?.s_d0 || '--'} <span className="text-sm font-medium">µg/m³</span></p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                        <p className="text-xs font-bold text-slate-400 uppercase mb-2">Temp</p>
                                        <p className="text-3xl font-black">{deviceData?.s_t0 || '--'} <span className="text-sm font-medium">°C</span></p>
                                    </div>
                                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                        <p className="text-xs font-bold text-slate-400 uppercase mb-2">Humidity</p>
                                        <p className="text-3xl font-black">{deviceData?.s_h0 || '--'} <span className="text-sm font-medium">%</span></p>
                                    </div>
                                </div>
                                <button onClick={() => setView('map')} className="text-sm font-bold text-slate-400 hover:text-slate-900 underline">Return to Global Map</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
