<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | LASS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        .animate-ping-slow { animation: ping 3s cubic-bezier(0, 0, 0.2, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTS ---
        const MetricCard = ({ label, val, unit, color }) => (
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">{label}</p>
                <div className="text-2xl font-black">
                    {val || '--'} <span className="text-sm font-medium text-slate-400">{unit}</span>
                </div>
                <div className="w-full bg-slate-100 h-1.5 mt-4 rounded-full overflow-hidden">
                    <div 
                        className={`h-full ${color} transition-all duration-1000`} 
                        style={{ width: `${Math.min(parseFloat(val) || 0, 100)}%` }}
                    ></div>
                </div>
            </div>
        );

        const App = () => {
            const [view, setView] = useState('map'); // 'map' or 'device'
            const [selectedId, setSelectedId] = useState(null);
            const [devices, setDevices] = useState(() => {
                const saved = localStorage.getItem("user_devices");
                return saved ? JSON.parse(saved) : [];
            });
            const [deviceData, setDeviceData] = useState(null);
            const [loading, setLoading] = useState(false);

            // Fetch data from LASS API
            const fetchLASS = async (id) => {
                setLoading(true);
                try {
                    const res = await fetch('https://pm25.lass-net.org/data/last-all-lass.json');
                    const json = await res.json();
                    const data = json.feeds.find(f => f.device_id === id);
                    setDeviceData(data);
                } catch (e) {
                    console.error("Fetch error", e);
                }
                setLoading(false);
            };

            const addDevice = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newDevice = {
                    id: formData.get('deviceId'),
                    name: formData.get('name'),
                    lat: formData.get('lat'),
                    lng: formData.get('lng')
                };
                const updated = [...devices, newDevice];
                setDevices(updated);
                localStorage.setItem("user_devices", JSON.stringify(updated));
                e.target.reset();
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-white border-r border-slate-200 flex flex-col p-6">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="h-10 w-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="wind"></i>
                            </div>
                            <span className="font-black text-xl tracking-tighter italic">AETHER</span>
                        </div>

                        <form onSubmit={addDevice} className="space-y-3 mb-10">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Register Device</p>
                            <input name="deviceId" placeholder="LASS ID (e.g. B827...)" className="w-full p-2 text-sm border rounded-lg outline-none focus:ring-2 ring-slate-200" required />
                            <input name="name" placeholder="Nickname" className="w-full p-2 text-sm border rounded-lg outline-none focus:ring-2 ring-slate-200" required />
                            <div className="flex gap-2">
                                <input name="lat" placeholder="Lat (0-100)" className="w-1/2 p-2 text-sm border rounded-lg outline-none" required />
                                <input name="lng" placeholder="Lng (0-100)" className="w-1/2 p-2 text-sm border rounded-lg outline-none" required />
                            </div>
                            <button type="submit" className="w-full bg-slate-900 text-white p-2 rounded-lg text-sm font-bold hover:bg-slate-800 transition-colors">
                                Deploy Analytics
                            </button>
                        </form>

                        <nav className="flex-1 overflow-y-auto">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Navigations</p>
                            <button onClick={() => setView('map')} className={`w-full flex items-center gap-3 p-3 rounded-xl mb-2 font-bold text-sm ${view === 'map' ? 'bg-slate-100 text-slate-900' : 'text-slate-500'}`}>
                                <i data-lucide="map"></i> Live Map
                            </button>
                            {devices.map(dev => (
                                <button 
                                    key={dev.id}
                                    onClick={() => { setView('device'); setSelectedId(dev.id); fetchLASS(dev.id); }}
                                    className={`w-full flex items-center justify-between p-3 rounded-xl mb-1 font-bold text-sm ${selectedId === dev.id && view === 'device' ? 'bg-slate-100 text-slate-900' : 'text-slate-500'}`}
                                >
                                    <span className="flex items-center gap-3 truncate">
                                        <i data-lucide="layout-dashboard"></i> {dev.name}
                                    </span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 bg-slate-50 overflow-y-auto">
                        {view === 'map' ? (
                            <div className="p-10 h-full flex flex-col">
                                <h1 className="text-3xl font-black mb-2">Command Center</h1>
                                <p className="text-slate-500 mb-8">Click a point to view environmental metrics.</p>
                                <div className="flex-1 bg-slate-900 rounded-3xl relative overflow-hidden shadow-2xl">
                                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#fff_1px,transparent_1px)] [background-size:20px_20px]"></div>
                                    {devices.map(dev => (
                                        <div 
                                            key={dev.id}
                                            className="absolute cursor-pointer group"
                                            style={{ left: `${dev.lng}%`, top: `${dev.lat}%` }}
                                            onClick={() => { setView('device'); setSelectedId(dev.id); fetchLASS(dev.id); }}
                                        >
                                            <div className="absolute h-12 w-12 bg-emerald-500/20 rounded-full -translate-x-1/2 -translate-y-1/2 animate-ping-slow"></div>
                                            <div className="bg-emerald-500 text-white px-3 py-1 rounded-full text-[10px] font-black shadow-lg border-2 border-white -translate-x-1/2 -translate-y-1/2 group-hover:scale-110 transition-transform">
                                                {dev.name}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="p-10 space-y-8">
                                <div className="flex justify-between items-end">
                                    <div>
                                        <h1 className="text-4xl font-black uppercase tracking-tighter">{selectedId}</h1>
                                        <p className="text-slate-500 font-medium">LASS Live Data Feed • {deviceData?.timestamp || 'Syncing...'}</p>
                                    </div>
                                    <button onClick={() => fetchLASS(selectedId)} className="bg-white border p-3 rounded-xl hover:bg-slate-50 shadow-sm">
                                        <i data-lucide="refresh-cw" className={loading ? "animate-spin" : ""}></i>
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <MetricCard label="PM2.5 Concentration" val={deviceData?.s_d0} unit="µg/m³" color="bg-orange-500" />
                                    <MetricCard label="Ambient Temp" val={deviceData?.s_t0} unit="°C" color="bg-red-500" />
                                    <MetricCard label="Relative Humidity" val={deviceData?.s_h0} unit="%" color="bg-blue-500" />
                                    <MetricCard label="CO2 Level" val={deviceData?.s_g8} unit="ppm" color="bg-emerald-500" />
                                </div>

                                <div className="bg-white rounded-3xl p-10 h-64 border border-slate-100 flex items-center justify-center text-slate-300 italic font-medium">
                                    Analytics Visualization Engine Loading...
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after React renders
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
