<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Live Map Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
        .animate-ping-custom { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('map');
            const [devices, setDevices] = useState(() => {
                const saved = localStorage.getItem("user_devices");
                // Added a default device so the map isn't blank on first load
                return saved ? JSON.parse(saved) : [
                    { id: 'B827EB63D1C8', name: 'Center Station', lat: 50, lng: 50 }
                ];
            });

            // Re-run icon replacement whenever the view changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, devices]);

            const addDevice = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newDev = {
                    id: formData.get('deviceId').trim(),
                    name: formData.get('name'),
                    lat: formData.get('lat'),
                    lng: formData.get('lng')
                };
                const updated = [...devices, newDev];
                setDevices(updated);
                localStorage.setItem("user_devices", JSON.stringify(updated));
                e.target.reset();
            };

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    {/* SIDEBAR */}
                    <aside className="w-72 bg-white border-r border-slate-200 p-6 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="h-10 w-10 bg-slate-900 rounded-xl flex items-center justify-center text-white">
                                <i data-lucide="wind"></i>
                            </div>
                            <span className="font-black text-xl tracking-tighter">AETHER</span>
                        </div>

                        <form onSubmit={addDevice} className="space-y-3 mb-10">
                            <p className="text-[10px] font-bold text-slate-400 uppercase">Register Device</p>
                            <input name="deviceId" placeholder="LASS ID (e.g. B827...)" className="w-full p-2 text-sm border rounded-lg" required />
                            <input name="name" placeholder="Nickname" className="w-full p-2 text-sm border rounded-lg" required />
                            <div className="flex gap-2">
                                <input name="lat" placeholder="Lat 0-100" className="w-1/2 p-2 text-sm border rounded-lg" required />
                                <input name="lng" placeholder="Lng 0-100" className="w-1/2 p-2 text-sm border rounded-lg" required />
                            </div>
                            <button className="w-full bg-slate-900 text-white p-2 rounded-lg text-sm font-bold">Deploy Analytics</button>
                        </form>

                        <nav className="flex-1 overflow-y-auto">
                            <p className="text-[10px] font-bold text-slate-400 uppercase mb-4">Navigations</p>
                            <button onClick={() => setView('map')} className="w-full flex items-center gap-3 p-3 rounded-xl mb-2 font-bold text-sm bg-slate-100">
                                <i data-lucide="map"></i> Live Map
                            </button>
                        </nav>
                    </aside>

                    {/* MAIN MAP AREA */}
                    <main className="flex-1 p-10 flex flex-col overflow-hidden">
                        <h1 className="text-3xl font-black mb-1">Command Center</h1>
                        <p className="text-slate-500 mb-8">Live LASS Network Visualization</p>
                        
                        <div className="flex-1 bg-slate-900 rounded-[2.5rem] relative overflow-hidden shadow-2xl border-8 border-white">
                            {/* Dot Grid Pattern */}
                            <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'radial-gradient(#fff 1px, transparent 1px)', backgroundSize: '24px 24px' }}></div>
                            
                            {devices.map((dev, index) => (
                                <div 
                                    key={index}
                                    className="absolute transform -translate-x-1/2 -translate-y-1/2"
                                    style={{ left: `${dev.lng}%`, top: `${dev.lat}%` }}
                                >
                                    <div className="relative">
                                        <div className="absolute h-12 w-12 bg-emerald-500/40 rounded-full -left-4 -top-4 animate-ping-custom"></div>
                                        <div className="bg-emerald-500 text-white px-4 py-1.5 rounded-full text-xs font-black shadow-xl border-2 border-white whitespace-nowrap relative z-10">
                                            {dev.name}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
